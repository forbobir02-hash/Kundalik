<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devoni Ilhom AI // Pro Studiya</title>
    <!-- HTML elementlarini rasmga (PNG/JPEG) aylantirish uchun kutubxona -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Georgia', serif; }
        
        :root {
            --bg-main: #fcfaf2;       
            --bg-sidebar: #f4efe2;    
            --bg-card: #ffffff;       
            --accent-gold: #b38f43;   
            --text-main: #2c251e;     
            --text-muted: #7c6f5e;    
            --border-color: #e6dec9;  
            --danger-red: #d32f2f;    
            --overlay-bg: rgba(252, 250, 242, 0.85); 
            --text-inverse: #ffffff;
        }

        body.dark {
            --bg-main: #12100e;       
            --bg-sidebar: #1a1613;    
            --bg-card: #231e1a;       
            --accent-gold: #dfb76c;   
            --text-main: #f5f0e6;    
            --text-muted: #a39682;    
            --border-color: #322b24;
            --danger-red: #c94a4a;
            --overlay-bg: rgba(18, 16, 14, 0.75);
            --text-inverse: #12100e;
        }

        body { 
            display: flex; 
            height: 100vh; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            overflow: hidden; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* SIDEBAR */
        .sidebar {
            width: 380px; 
            background-color: var(--bg-sidebar); 
            border-right: 1px solid var(--border-color);
            display: flex; 
            flex-direction: column; 
            height: 100%;
            box-shadow: 2px 0 15px rgba(0,0,0,0.05);
            z-index: 5;
        }
        
        .sidebar-header { 
            padding: 20px 20px 10px 20px; 
            border-bottom: 1px solid var(--border-color); 
            text-align: center;
        }
        .sidebar-header h2 { 
            font-size: 20px; 
            color: var(--accent-gold); 
            letter-spacing: 1.5px; 
            text-transform: uppercase;
            border-bottom: 1px double var(--accent-gold);
            padding-bottom: 5px;
            margin-bottom: 5px;
        }
        .sidebar-header p { font-size: 11px; color: var(--text-muted); font-style: italic; }
        
        .api-box {
            padding: 10px 20px;
            background: rgba(179, 143, 67, 0.08);
            border-bottom: 1px solid var(--border-color);
        }
        .api-input {
            width: 100%;
            padding: 8px;
            font-size: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-card);
            color: var(--text-main);
            outline: none;
        }

        .search-filter-box {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .search-input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-card);
            color: var(--text-main);
            font-size: 13px;
        }
        
        .stats-mini-box {
            display: flex;
            justify-content: space-around;
            padding: 8px;
            background: rgba(179, 143, 67, 0.03);
            font-size: 11px;
            border-bottom: 1px solid var(--border-color);
        }
        .stat-val { font-weight: bold; color: var(--accent-gold); font-size: 13px; }

        .poem-list { flex: 1; overflow-y: auto; padding: 12px; }
        
        .poem-item {
            background: var(--bg-card); 
            padding: 12px; 
            border-radius: 4px; 
            margin-bottom: 10px;
            cursor: pointer; 
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        .poem-item.active {
            border-color: var(--accent-gold); 
            background: var(--bg-main);
        }
        .poem-item h4 { font-size: 14px; color: var(--text-main); font-weight: bold; }
        
        .add-btn-container { 
            padding: 12px; 
            border-top: 1px solid var(--border-color); 
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .btn {
            width: 100%; padding: 9px; background: transparent; color: var(--accent-gold);
            border: 1px solid var(--accent-gold); border-radius: 4px; cursor: pointer;
            font-size: 11px; text-transform: uppercase; font-weight: bold; transition: all 0.2s;
            text-align: center;
        }
        .btn:hover { background: var(--accent-gold); color: var(--text-inverse); }
        .btn-group-row { display: flex; gap: 6px; }

        /* MAIN WORKSPACE */
        .main-content { 
            flex: 1; display: flex; flex-direction: column; height: 100%; 
            background: var(--bg-main); position: relative;
        }
        .main-content::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--overlay-bg); z-index: 1;
        }

        .workspace { 
            flex: 1; display: flex; flex-direction: column; padding: 25px; overflow-y: auto; align-items: center; z-index: 2;
        }
        
        .top-bar { 
            width: 100%; max-width: 750px; display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center;
        }
        .action-group { display: flex; gap: 8px; }
        .del-btn { border-color: var(--danger-red); color: var(--danger-red); }
        .del-btn:hover { background: var(--danger-red); color: #ffffff; }

        .ai-btn {
            background: linear-gradient(135deg, #b38f43, #dfb76c);
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-size: 11px;
            letter-spacing: 1px;
        }
        .ai-btn:hover {
            box-shadow: 0 0 12px rgba(223, 183, 108, 0.6);
            transform: translateY(-1px);
        }

        .poem-editor { width: 100%; max-width: 750px; display: flex; flex-direction: column; gap: 15px; }
        .input-title {
            background: transparent; border: none; border-bottom: 1px double var(--border-color);
            color: var(--text-main); font-size: 26px; padding-bottom: 8px; text-align: center; font-weight: bold; outline: none;
        }
        .textarea-body {
            background: transparent; border: none; color: var(--text-main); font-size: 18px;
            line-height: 1.8; resize: none; min-height: 300px; outline: none; text-align: center; font-style: italic;
        }

        .audio-section {
            display: flex; align-items: center; gap: 15px; padding: 15px;
            background: rgba(179, 143, 67, 0.04); border: 1px dashed var(--border-color); border-radius: 4px;
        }
        .rec-btn {
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent-gold);
            background: transparent; color: var(--accent-gold); font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        .rec-btn.recording { background: var(--danger-red); border-color: var(--danger-red); color: white; }

        /* MODAL WINDOW FOR AI POSTER */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center;
            padding: 20px;
        }
        .modal-content {
            background: var(--bg-main); padding: 20px; border-radius: 8px; max-width: 550px; width: 100%;
            display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-height: 90vh; overflow-y: auto;
        }
        
        .options-row {
            display: flex; gap: 10px; background: rgba(179, 143, 67, 0.05); padding: 10px; border-radius: 4px; border: 1px solid var(--border-color);
        }
        .option-select {
            flex: 1; padding: 6px; font-size: 12px; font-family: sans-serif; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-card); color: var(--text-main); outline: none;
        }

        .poster-preview-area {
            width: 100%; aspect-ratio: 1 / 1.4; border: 1px solid var(--border-color);
            background: white; border-radius: 4px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: aspect-ratio 0.3s ease;
            position: relative;
        }

        /* html2canvas to'g'ri ishlashi uchun yashirin renderlash bloki */
        #sandboxContainer {
            position: absolute; left: -9999px; top: -9999px;
            width: 0; height: 0; overflow: hidden;
        }

        @media print {
            body * { visibility: hidden; }
            .poster-preview-area, .poster-preview-area * { visibility: visible; }
            .poster-preview-area { position: absolute; left: 0; top: 0; width: 100%; height: 100%; border: none; }
        }
    </style>
</head>
<body>

    <!-- YASHIRIN SANDBOX (Rasmga eksport qilish uchun) -->
    <div id="sandboxContainer"></div>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Devoni Ilhom AI</h2>
            <p>Sun'iy Intellekt Integratsiyasi</p>
        </div>

        <div class="api-box">
            <input type="password" class="api-input" id="geminiApiKey" placeholder="Gemini API kalitini kiriting...">
        </div>

        <div class="search-filter-box">
            <input type="text" class="search-input" id="searchInput" placeholder="She'rlarni qidirish...">
        </div>

        <div class="stats-mini-box">
            <div class="stat-item"><span class="stat-val" id="statCount">0</span> sahifa</div>
            <div class="stat-item"><span class="stat-val" id="statAudio">0</span> ovozli</div>
        </div>

        <div class="poem-list" id="poemList"></div>

        <div class="add-btn-container">
            <button class="btn" id="newPoemBtn">+ Yangi Sahifa</button>
            <div class="btn-group-row">
                <button class="btn" id="themeToggleBtn" style="flex:1;">🌙 Tun</button>
                <label class="btn" for="importJsonInput" style="flex:1; display:block;">📤 Tiklash</label>
                <input type="file" id="importJsonInput" accept=".json" style="display: none;">
            </div>
            <button class="btn" id="exportJsonBtn">📥 Zaxiralash</button>
        </div>
    </div>

    <!-- MAIN WORKSPACE -->
    <div class="main-content" id="mainWorkspace">
        <div class="workspace">
            <div class="top-bar">
                <div class="action-group">
                    <button class="btn" id="savePoemBtn" style="padding: 10px 25px;">💾 Saqlash</button>
                    <button class="btn ai-btn" id="generatePosterBtn">✨ AI Poster Sozlamalari</button>
                </div>
                <button class="btn del-btn" id="deletePoemBtn">O'chirish</button>
            </div>
            
            <div class="poem-editor">
                <input type="text" class="input-title" id="poemTitle" placeholder="Sarlavha...">
                <textarea class="textarea-body" id="poemBody" placeholder="She'ringizni shu yerga yozing..."></textarea>
                
                <div class="audio-section">
                    <button class="rec-btn" id="recordAudioBtn">REC</button>
                    <div id="audioStatus">Ovoz yozilmagan</div>
                    <audio id="audioPlayer" controls style="display: none;"></audio>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="posterModal">
        <div class="modal-content">
            <h3 style="text-align:center; color: var(--accent-gold);">Gemini San'at Asari</h3>
            
            <div class="options-row">
                <select class="option-select" id="posterRatio">
                    <option value="1/1.4">Knijniy (A4 / Istoriya) - 1:1.4</option>
                    <option value="1/1">Kvadrat (Post) - 1:1</option>
                    <option value="1.4/1">Albomniy (Prezentatsiya) - 1.4:1</option>
                </select>
                <!-- FORMAT TANLASH (PNG / JPEG) -->
                <select class="option-select" id="exportFormat">
                    <option value="png">Format: PNG (Shaffof/Tiniq)</option>
                    <option value="jpeg">Format: JPEG (Yengil hajm)</option>
                </select>
            </div>

            <button class="btn ai-btn" id="startAiRenderBtn">🎨 Tasvirni Render Qilish</button>

            <div class="poster-preview-area" id="posterPreview"></div>
            
            <div class="btn-group-row">
                <button class="btn" id="downloadPosterBtn" style="flex:1; background: var(--accent-gold); color: white;">💾 Rasm Qilib Yuklash</button>
                <button class="btn" id="printPosterBtn" style="flex:0.5;">🖨️ PDF</button>
                <button class="btn del-btn" id="closeModalBtn" style="flex:0.5;">Yopish</button>
            </div>
        </div>
    </div>

    <script>
        let db;
        let poems = JSON.parse(localStorage.getItem('poems_meta_ai')) || [];
        let currentPoemId = null;
        let mediaRecorder;
        let audioChunks = [];
        let currentAudioBlob = null;
        let rawAiHtml = ""; 

        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const geminiApiKey = document.getElementById('geminiApiKey');
        const posterModal = document.getElementById('posterModal');
        const posterPreview = document.getElementById('posterPreview');
        const posterRatio = document.getElementById('posterRatio');
        const exportFormat = document.getElementById('exportFormat');
        const sandboxContainer = document.getElementById('sandboxContainer');

        geminiApiKey.value = localStorage.getItem('gemini_api_key') || '';
        geminiApiKey.addEventListener('input', () => {
            localStorage.setItem('gemini_api_key', geminiApiKey.value.trim());
        });

        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
        themeToggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        });

        const request = indexedDB.open("PoemAudioDBAI", 1);
        request.onupgradeneeded = (e) => { e.target.result.createObjectStore("audios", { keyPath: "id" }); };
        request.onsuccess = (e) => { 
            db = e.target.result; 
            renderPoemList();
            if(poems.length > 0) loadPoem(poems[0].id); else initNewPoem();
        };

        const poemList = document.getElementById('poemList');
        const poemTitle = document.getElementById('poemTitle');
        const poemBody = document.getElementById('poemBody');
        const recordAudioBtn = document.getElementById('recordAudioBtn');
        const audioStatus = document.getElementById('audioStatus');
        const audioPlayer = document.getElementById('audioPlayer');

        function initNewPoem() {
            currentPoemId = 'poem_' + Date.now();
            poemTitle.value = ''; poemBody.value = ''; currentAudioBlob = null;
            audioPlayer.style.display = 'none'; audioStatus.textContent = "Ovoz yozilmagan";
            document.querySelectorAll('.poem-item').forEach(i => i.classList.remove('active'));
        }

        function renderPoemList() {
            poemList.innerHTML = '';
            const q = document.getElementById('searchInput').value.toLowerCase();
            poems.filter(p => p.title.toLowerCase().includes(q) || p.body.toLowerCase().includes(q)).forEach(poem => {
                const item = document.createElement('div');
                item.className = `poem-item ${poem.id === currentPoemId ? 'active' : ''}`;
                item.onclick = () => loadPoem(poem.id);
                item.innerHTML = `<h4>${poem.title}</h4><p>📅 ${poem.date} ${poem.hasAudio ? '🎙️' : ''}</p>`;
                poemList.appendChild(item);
            });
            document.getElementById('statCount').textContent = poems.length;
            document.getElementById('statAudio').textContent = poems.filter(p => p.hasAudio).length;
        }

        function savePoem() {
            if(!poemTitle.value.trim() && !poemBody.value.trim()) return;
            const idx = poems.findIndex(p => p.id === currentPoemId);
            const meta = { id: currentPoemId, title: poemTitle.value.trim() || 'Sarlavhasiz', date: new Date().toLocaleDateString('uz-UZ'), body: poemBody.value, hasAudio: currentAudioBlob !== null || (idx > -1 && poems[idx].hasAudio) };
            if(idx > -1) poems[idx] = meta; else poems.unshift(meta);
            localStorage.setItem('poems_meta_ai', JSON.stringify(poems));
            if (currentAudioBlob) {
                const tx = db.transaction(["audios"], "readwrite");
                tx.objectStore("audios").put({ id: currentPoemId, blob: currentAudioBlob });
            }
            renderPoemList();
            alert("Muvaffaqiyatli saqlandi!");
        }

        function loadPoem(id) {
            currentPoemId = id; const poem = poems.find(p => p.id === id); if(!poem) return;
            poemTitle.value = poem.title; poemBody.value = poem.body;
            renderPoemList();
            audioPlayer.style.display = 'none'; audioStatus.textContent = "Kuting...";
            const tx = db.transaction(["audios"], "readonly");
            tx.objectStore("audios").get(id).onsuccess = (e) => {
                if(e.target.result) {
                    currentAudioBlob = e.target.result.blob;
                    audioPlayer.src = URL.createObjectURL(currentAudioBlob);
                    audioPlayer.style.display = 'block'; audioStatus.textContent = "🎙️ Bayt tinglash:";
                } else audioStatus.textContent = "Ovoz yozilmagan";
            };
        }

        recordAudioBtn.addEventListener('click', async () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                audioChunks = [];
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        currentAudioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                        audioPlayer.src = URL.createObjectURL(currentAudioBlob); audioPlayer.style.display = 'block';
                        audioStatus.textContent = "Ovoz muhrlandi (Saqlashni bosing)";
                        stream.getTracks().forEach(t => t.stop());
                    };
                    mediaRecorder.start(); recordAudioBtn.textContent = "STOP"; recordAudioBtn.classList.add('recording');
                    audioStatus.textContent = "🔴 Ovoz yozilmoqda...";
                } catch (err) { alert("Mikrofonga ruxsat berilmadi!"); }
            } else { mediaRecorder.stop(); recordAudioBtn.textContent = "REC"; recordAudioBtn.classList.remove('recording'); }
        });

        posterRatio.addEventListener('change', () => {
            posterPreview.style.aspectRatio = posterRatio.value;
        });

        document.getElementById('generatePosterBtn').addEventListener('click', () => {
            const body = poemBody.value.trim();
            if (!body) { alert("Poster yaratish uchun avval she'r matnini yozing!"); return; }
            posterPreview.innerHTML = "<div style='padding:40px; text-align:center; color:var(--text-muted); font-style:italic;'>O'lcham va formatni tanlang, so'ng 'Tasvirni Render Qilish' tugmasini bosing.</div>";
            posterPreview.style.aspectRatio = posterRatio.value;
            posterModal.style.display = 'flex';
        });

        // AI RENDERING
        document.getElementById('startAiRenderBtn').addEventListener('click', async () => {
            const key = geminiApiKey.value.trim();
            const title = poemTitle.value.trim() || 'Sarlavhasiz';
            const body = poemBody.value.trim();
            const selectedRatio = posterRatio.value;

            if (!key) { alert("Iltimos, avval chap paneldagi katakka Gemini API kalitingizni kiriting!"); return; }

            posterPreview.innerHTML = "<div style='padding:40px; text-align:center; color:#b38f43; font-style:italic;'>🤖 Gemini format talablariga moslab she'riy grafik dizayn render qilmoqda...</div>";

            const promptText = `Siz professional grafik dizaynersiz. Quyida taqdim etilgan o'zbekcha she'r matni va uning sarlavhasini o'rganib chiqib, bitta chiroyli, mustaqil HTML va inline CSS kodli vizual poster yarating.

            DIQQAT QAT'IY TALAB: Siz o'zingizdan umuman yangi she'r yozmaysiz. Berilgan asl she'r matnini o'zgarishsiz, to'liqligicha poster ichiga joylashtirasiz.

            She'r Sarlavhasi: ${title}
            She'rning Asl Matni:
            ${body}

            Format va Texnik talablar:
            1. Posterning tomonlar nisbati aniq [ ${selectedRatio} ] formatda bo'lishi shart. Barcha matnlar va grafik elementlar shu blok ichiga sig'sin.
            2. Poster markazida she'r sarlavhasi (${title}) va uning ostida she'r matni (${body}) to'liq, satrma-satr, nafis badiiy shriftda joylashsin.
            3. Orqa fon uchun juda nafis va tekis gradientlar yoki minimalist klassik uslubdan foydalaning.
            4. Chekkalarga milliy naqshlar, ramziy bezaklar qo'shish uchun faqat ichki inline CSS va murakkab SVG grafikalaridan foydalaning. Tashqi internet havolalaridan (img src) foydalanmang.
            5. Javobingizda faqat va faqat toza HTML kod bo'lsin, hech qanday markdown belgilari (\`\`\`html) yoki qo'shimcha izohlar bo'lmasin.`;

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `Server xatosi: ${response.status}`);
                }

                const data = await response.json();
                if (!data.candidates || data.candidates.length === 0) throw new Error("Gemini javob qaytara olmadi.");

                rawAiHtml = data.candidates[0].content.parts[0].text;
                rawAiHtml = rawAiHtml.replace(/```html/g, "").replace(/```/g, "").trim();
                
                const iframe = document.createElement('iframe');
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.border = 'none';
                posterPreview.innerHTML = '';
                posterPreview.appendChild(iframe);
                
                const doc = iframe.contentWindow.document;
                doc.open();
                doc.write(`<html><head><style>body{margin:0; padding:0; height:100vh; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#fff;}</style></head><body>${rawAiHtml}</body></html>`);
                doc.close();

            } catch (error) {
                console.error(error);
                posterPreview.innerHTML = `
                    <div style='padding:30px; color:#d32f2f; text-align:center; font-size:14px;'>
                        <strong style='font-size:16px;'>Xatolik!</strong><br><br>
                        Sabab: ${error.message}
                    </div>`;
            }
        });

        // TO'G'RILANGAN RASM YUKLASH FUNKSIYASI
        document.getElementById('downloadPosterBtn').addEventListener('click', () => {
            if (!rawAiHtml) { alert("Avval posterni render qiling!"); return; }

            const ratioValues = posterRatio.value.split('/');
            const width = 1200;
            const height = Math.round(width * (parseFloat(ratioValues[1]) / parseFloat(ratioValues[0])));

            sandboxContainer.innerHTML = '';
            const frame = document.createElement('iframe');
            frame.style.width = width + "px";
            frame.style.height = height + "px";
            frame.style.position = "absolute";
            frame.style.visibility = "hidden";
            frame.style.border = "none";
            sandboxContainer.appendChild(frame);

            const frameDoc = frame.contentWindow.document;
            frameDoc.open();
            frameDoc.write(`
                <html>
                <head>
                    <style>
                        html, body { 
                            margin: 0; padding: 0; 
                            width: ${width}px; height: ${height}px; 
                            overflow: hidden; 
                            box-sizing: border-box;
                        }
                    </style>
                </head>
                <body>
                    ${rawAiHtml}
                </body>
                </html>
            `);
            frameDoc.close();

            setTimeout(() => {
                const targetBody = frameDoc.body;
                const selectedFormat = exportFormat.value;
                const mimeType = selectedFormat === 'png' ? 'image/png' : 'image/jpeg';
                const extension = selectedFormat === 'png' ? '.png' : '.jpg';

                html2canvas(targetBody, {
                    width: width,
                    height: height,
                    scale: 1, 
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: null 
                }).then(canvas => {
                    const imgData = canvas.toDataURL(mimeType, 0.95);
                    
                    const a = document.createElement('a');
                    a.href = imgData;
                    a.download = (poemTitle.value.trim() || 'poster') + extension;
                    a.click();

                    sandboxContainer.innerHTML = "";
                }).catch(err => {
                    alert("Rasmga aylantirishda xatolik yuz berdi: " + err.message);
                });
            }, 300); 
        });

        document.getElementById('closeModalBtn').addEventListener('click', () => posterModal.style.display = 'none');
        document.getElementById('printPosterBtn').addEventListener('click', () => {
            const iframe = posterPreview.querySelector('iframe');
            if(iframe) { iframe.contentWindow.print(); } else { window.print(); }
        });

        document.getElementById('exportJsonBtn').addEventListener('click', () => {
            const blob = new Blob([JSON.stringify({ meta: poems })], { type: "application/json" });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `daftari_ilhom_backup.json`; a.click();
        });
        document.getElementById('deletePoemBtn').addEventListener('click', () => {
            if(confirm("O'chirilsinmi?")) {
                poems = poems.filter(p => p.id !== currentPoemId);
                localStorage.setItem('poems_meta_ai', JSON.stringify(poems)); initNewPoem(); renderPoemList();
            }
        });
        document.getElementById('newPoemBtn').addEventListener('click', initNewPoem);
        document.getElementById('savePoemBtn').addEventListener('click', savePoem);
        document.getElementById('searchInput').addEventListener('input', renderPoemList);
    </script>
</body>
</html>
