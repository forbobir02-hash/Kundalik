<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qalb Daftari Pro // Shaxsiy Ijod Studiyasi</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Georgia', serif; }
        
        /* CSS VARIABLE'LAR (DEFAULT: YORQIN REJIM) */
        :root {
            --bg-main: #fcfaf2;       
            --bg-sidebar: #f4efe2;    
            --bg-card: #ffffff;       
            --accent-gold: #b38f43;   
            --text-main: #2c251e;     
            --text-muted: #7c6f5e;    
            --border-color: #e6dec9;  
            --danger-red: #d32f2f;    
            --overlay-bg: rgba(252, 250, 242, 0.85); 
            --text-inverse: #ffffff;
            --tag-bg: #e6dec9;
        }

        /* TUN REJIMI (DARK MODE) */
        body.dark {
            --bg-main: #12100e;       
            --bg-sidebar: #1a1613;    
            --bg-card: #231e1a;       
            --accent-gold: #dfb76c;   
            --text-main: #f5f0e6;    
            --text-muted: #a39682;    
            --border-color: #322b24;
            --danger-red: #c94a4a;
            --overlay-bg: rgba(18, 16, 14, 0.75);
            --text-inverse: #12100e;
            --tag-bg: #322b24;
        }

        body { 
            display: flex; 
            height: 100vh; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            overflow: hidden; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* SIDEBAR STRUCTURE */
        .sidebar {
            width: 380px; 
            background-color: var(--bg-sidebar); 
            border-right: 1px solid var(--border-color);
            display: flex; 
            flex-direction: column; 
            height: 100%;
            box-shadow: 2px 0 15px rgba(0,0,0,0.05);
            z-index: 5;
            transition: background-color 0.3s, border-color 0.3s;
        }
        
        .sidebar-header { 
            padding: 25px 20px 15px 20px; 
            border-bottom: 1px solid var(--border-color); 
            text-align: center;
        }
        .sidebar-header h2 { 
            font-size: 22px; 
            color: var(--accent-gold); 
            letter-spacing: 1.5px; 
            font-weight: normal;
            text-transform: uppercase;
            border-bottom: 1px double var(--accent-gold);
            padding-bottom: 5px;
            margin-bottom: 5px;
        }
        .sidebar-header p { font-size: 12px; color: var(--text-muted); font-style: italic; }
        
        /* SEARCH & FILTER CONTROLS */
        .search-filter-box {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .search-input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-card);
            color: var(--text-main);
            outline: none;
            font-size: 14px;
        }
        .filter-row {
            display: flex;
            gap: 10px;
        }
        .sort-select {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-main);
            border-radius: 4px;
            outline: none;
            font-size: 12px;
        }

        /* STATS SUMMARY IN SIDEBAR */
        .stats-mini-box {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            background: rgba(179, 143, 67, 0.05);
            font-size: 11px;
            border-bottom: 1px solid var(--border-color);
        }
        .stat-item { text-align: center; }
        .stat-val { font-weight: bold; color: var(--accent-gold); font-size: 14px; }

        .poem-list { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
        }
        
        .poem-item {
            background: var(--bg-card); 
            padding: 15px; 
            border-radius: 4px; 
            margin-bottom: 12px;
            cursor: pointer; 
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        .poem-item:hover {
            border-color: var(--accent-gold);
            transform: translateY(-2px);
        }
        .poem-item.active {
            border-color: var(--accent-gold); 
            background: var(--bg-main);
            box-shadow: 0 4px 12px rgba(179, 143, 67, 0.1);
        }
        .poem-item h4 { 
            font-size: 15px; 
            color: var(--text-main); 
            margin-bottom: 6px; 
            font-weight: bold;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        .poem-item p { 
            font-size: 11px; 
            color: var(--text-muted); 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-tags {
            margin-top: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .mini-tag {
            font-size: 9px;
            background: var(--tag-bg);
            padding: 1px 4px;
            border-radius: 3px;
            color: var(--text-muted);
        }

        .audio-badge {
            background: rgba(179, 143, 67, 0.1);
            color: var(--accent-gold);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 9px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .add-btn-container { 
            padding: 15px; 
            border-top: 1px solid var(--border-color); 
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .btn {
            width: 100%; 
            padding: 10px; 
            background: transparent; 
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold); 
            border-radius: 4px; 
            cursor: pointer;
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: all 0.3s;
            text-align: center;
            font-weight: bold;
            outline: none;
        }
        .btn:hover { 
            background: var(--accent-gold); 
            color: var(--text-inverse); 
        }

        .btn-group-row {
            display: flex;
            gap: 8px;
        }

        /* MAIN WORKSPACE */
        .main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            background: var(--bg-main);
            position: relative;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background 0.5s ease-in-out, background-color 0.3s;
        }
        
        .main-content::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--overlay-bg); 
            z-index: 1;
            pointer-events: none;
            transition: background 0.3s;
        }

        .workspace { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 30px; 
            overflow-y: auto; 
            align-items: center;
            z-index: 2;
        }
        
        .top-bar { 
            width: 100%; 
            max-width: 750px; 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 25px; 
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .action-group {
            display: flex;
            gap: 8px;
        }

        .del-btn { border-color: var(--danger-red); color: var(--danger-red); }
        .del-btn:hover { background: var(--danger-red); color: #ffffff; }

        .poem-editor { 
            width: 100%; 
            max-width: 750px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }
        
        .input-title {
            background: transparent; 
            border: none; 
            border-bottom: 1px double var(--border-color);
            color: var(--text-main); 
            font-size: 28px; 
            padding-bottom: 10px; 
            outline: none; 
            width: 100%;
            text-align: center;
            font-weight: bold;
        }
        .input-title:focus { border-bottom-color: var(--accent-gold); }
        .input-title::placeholder { color: #bcae9b; font-style: italic; }
        
        /* TAGS INPUT FIELD */
        .tags-editor-box {
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
        }
        .input-tags {
            background: transparent;
            border: none;
            border-bottom: 1px dashed var(--border-color);
            color: var(--accent-gold);
            font-size: 14px;
            outline: none;
            width: 60%;
            text-align: center;
        }

        .textarea-body {
            background: transparent; 
            border: none; 
            color: var(--text-main); 
            font-size: 19px;
            line-height: 1.8; 
            resize: none; 
            min-height: 320px; 
            outline: none; 
            width: 100%;
            text-align: center; 
            font-style: italic;
        }
        .textarea-body::placeholder { color: #bcae9b; }

        /* DIKTOFON BLOKI */
        .audio-section {
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 20px;
            margin-top: 15px; 
            padding: 15px; 
            background: var(--bg-sidebar); 
            border-radius: 6px; 
            border: 1px solid var(--border-color);
        }
        
        .rec-btn {
            background: var(--danger-red); 
            color: white; 
            border: none; 
            width: 45px; 
            height: 45px;
            border-radius: 50%; 
            cursor: pointer; 
            font-size: 10px;
            text-transform: uppercase;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.3s;
            font-weight: bold;
        }
        .rec-btn.recording { 
            background: #ff3333; 
            animation: pulse 1.5s infinite; 
        }
        
        audio { flex: 1; max-width: 400px; }
        #audioStatus { font-size: 13px; color: var(--text-muted); font-style: italic; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(211, 47, 47, 0); }
            100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); }
        }

        /* PRINT STYLES FOR NATIVE PDF EXPORT */
        @media print {
            body * { visibility: hidden; }
            .main-content, .main-content * { visibility: visible; }
            .main-content { position: absolute; left: 0; top: 0; width: 100%; background: #ffffff !important; color: #000000 !important; }
            .main-content::before, .top-bar, .audio-section, .tags-editor-box { display: none !important; }
            .input-title { border: none; font-size: 32px; color: #000000; }
            .textarea-body { border: none; font-size: 22px; color: #000000; min-height: auto; }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; height: auto; max-height: 380px; }
            .workspace { padding: 15px; }
            .audio-section { flex-direction: column; }
            audio { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Devoni Ilhom Pro</h2>
            <p>Mukammal Ijodiy Studiya</p>
        </div>

        <!-- 1. QIDIRUV VA FILTRLAR -->
        <div class="search-filter-box">
            <input type="text" class="search-input" id="searchInput" placeholder="Sarlavha yoki matndan qidirish...">
            <div class="filter-row">
                <select class="sort-select" id="sortSelect">
                    <option value="newest">Eng yangi birinchi</option>
                    <option value="oldest">Eng eski birinchi</option>
                    <option value="alpha">Alifbo tartibida</option>
                </select>
            </div>
        </div>

        <!-- 4. STATISTIKA BLOKI -->
        <div class="stats-mini-box">
            <div class="stat-item"><div class="stat-val" id="statCount">0</div><div>She'rlar</div></div>
            <div class="stat-item"><div class="stat-val" id="statWords">0</div><div>So'zlar</div></div>
            <div class="stat-item"><div class="stat-val" id="statAudio">0</div><div>Ovozli</div></div>
        </div>

        <!-- RO'YXAT -->
        <div class="poem-list" id="poemList"></div>

        <!-- BOSHQARUV TUGMALARI -->
        <div class="add-btn-container">
            <button class="btn" id="newPoemBtn">+ Yangi Sahifa</button>
            <div class="btn-group-row">
                <label class="btn" for="bgInput" style="flex:1;">🖼️ Fon</label>
                <input type="file" id="bgInput" accept="image/*" style="display: none;">
                <button class="btn" id="themeToggleBtn" style="flex:1;">🌙 Tun</button>
            </div>
            
            <!-- 5. ZAXIRALASH TUGMALARI -->
            <div class="btn-group-row">
                <button class="btn" id="exportJsonBtn" style="font-size:10px; flex:1;">📥 Zaxira Yuklash</button>
                <label class="btn" for="importJsonInput" style="font-size:10px; flex:1; display:block;">📤 Tiklash</label>
                <input type="file" id="importJsonInput" accept=".json" style="display: none;">
            </div>
        </div>
    </div>

    <!-- MAIN WORKSPACE -->
    <div class="main-content" id="mainWorkspace">
        <div class="workspace">
            <div class="top-bar">
                <div class="action-group">
                    <button class="btn" id="savePoemBtn" style="padding: 10px 25px;">💾 Saqlash</button>
                    <!-- 2. EKSPORT FUNKSIYASI -->
                    <button class="btn" id="exportPdfBtn" style="padding: 10px 15px;">📄 PDF / Chop etish</button>
                </div>
                
                <div class="action-group">
                    <button class="btn del-btn" id="deletePoemBtn">O'chirish</button>
                </div>
            </div>
            
            <div class="poem-editor">
                <input type="text" class="input-title" id="poemTitle" placeholder="G'azal yoki she'r sarlavhasi...">
                
                <!-- 3. TEGLAR KIRITISH JOYI -->
                <div class="tags-editor-box">
                    <input type="text" class="input-tags" id="poemTags" placeholder="Teglar (vergul bilan ajrating: lirik, g'azal)">
                </div>

                <textarea class="textarea-body" id="poemBody" placeholder="Ushbu sahifaga dil izhorlaringizni biting..."></textarea>
                
                <!-- DIKTOFON -->
                <div class="audio-section">
                    <button class="rec-btn" id="recordAudioBtn">REC</button>
                    <div id="audioStatus">Ovoz yozilmagan</div>
                    <audio id="audioPlayer" controls style="display: none;"></audio>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db;
        let poems = JSON.parse(localStorage.getItem('poems_meta_pro')) || [];
        let currentPoemId = null;
        let mediaRecorder;
        let audioChunks = [];
        let currentAudioBlob = null;

        const mainWorkspace = document.getElementById('mainWorkspace');
        const bgInput = document.getElementById('bgInput');
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const poemTags = document.getElementById('poemTags');

        // REJIM LOGIKASI
        const savedTheme = localStorage.getItem('theme_pro') || 'light';
        if (savedTheme === 'dark') { document.body.classList.add('dark'); themeToggleBtn.textContent = '☀️ Kun'; }
        themeToggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('theme_pro', isDark ? 'dark' : 'light');
            themeToggleBtn.textContent = isDark ? '☀️ Kun' : '🌙 Tun';
        });

        // FON RASMI
        const savedBg = localStorage.getItem('custom_poem_bg_pro');
        if (savedBg) mainWorkspace.style.backgroundImage = `url(${savedBg})`;
        bgInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    mainWorkspace.style.backgroundImage = `url(${event.target.result})`;
                    localStorage.setItem('custom_poem_bg_pro', event.target.result);
                };
                reader.readAsDataURL(file);
            }
        });

        // INDEXED DB (OVOZLAR ARCHIVI)
        const request = indexedDB.open("PoemAudioDBPro", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("audios", { keyPath: "id" });
        };
        request.onsuccess = (e) => { 
            db = e.target.result; 
            renderPoemList();
            updateStats();
            if(poems.length > 0) loadPoem(poems[0].id);
            else initNewPoem();
        };

        const poemList = document.getElementById('poemList');
        const poemTitle = document.getElementById('poemTitle');
        const poemBody = document.getElementById('poemBody');
        const recordAudioBtn = document.getElementById('recordAudioBtn');
        const audioStatus = document.getElementById('audioStatus');
        const audioPlayer = document.getElementById('audioPlayer');

        function initNewPoem() {
            currentPoemId = 'poem_' + Date.now();
            poemTitle.value = '';
            poemBody.value = '';
            poemTags.value = '';
            currentAudioBlob = null;
            audioPlayer.style.display = 'none';
            audioStatus.textContent = "Ovoz yozilmagan";
            document.querySelectorAll('.poem-item').forEach(i => i.classList.remove('active'));
        }

        // QIDIRUV VA SARALASH INTEGRATSIYASI
        function renderPoemList() {
            poemList.innerHTML = '';
            const query = searchInput.value.toLowerCase().trim();
            let filtered = poems.filter(p => 
                p.title.toLowerCase().includes(query) || 
                p.body.toLowerCase().includes(query) ||
                (p.tags && p.tags.some(t => t.toLowerCase().includes(query)))
            );

            const sortVal = sortSelect.value;
            if (sortVal === 'oldest') filtered.reverse();
            else if (sortVal === 'alpha') {
                filtered.sort((a, b) => a.title.localeCompare(b.title));
            }

            filtered.forEach(poem => {
                const item = document.createElement('div');
                item.className = `poem-item ${poem.id === currentPoemId ? 'active' : ''}`;
                item.onclick = () => loadPoem(poem.id);
                
                let tagsHtml = '';
                if(poem.tags && poem.tags.length > 0) {
                    tagsHtml = `<div class="item-tags">${poem.tags.map(t => `<span class="mini-tag">#${t}</span>`).join('')}</div>`;
                }

                item.innerHTML = `
                    <h4>${poem.title || 'Sarlavhasiz bitik'}</h4>
                    <p><span>📅 ${poem.date}</span> ${poem.hasAudio ? '<span class="audio-badge">🎙️ Ovozli</span>' : ''}</p>
                    ${tagsHtml}
                `;
                poemList.appendChild(item);
            });
        }

        // STATISTIKA HISOBLASH
        function updateStats() {
            document.getElementById('statCount').textContent = poems.length;
            let totalWords = 0;
            let audioCount = 0;
            poems.forEach(p => {
                if(p.body) totalWords += p.body.trim().split(/\s+/).filter(Boolean).length;
                if(p.hasAudio) audioCount++;
            });
            document.getElementById('statWords').textContent = totalWords;
            document.getElementById('statAudio').textContent = audioCount;
        }

        // SAQLASH
        function savePoem() {
            if(!poemTitle.value.trim() && !poemBody.value.trim()) return;

            const tagsArray = poemTags.value.split(',').map(t => t.trim()).filter(t => t.length > 0);
            const existingIndex = poems.findIndex(p => p.id === currentPoemId);
            
            const poemMeta = {
                id: currentPoemId,
                title: poemTitle.value.trim() || 'Sarlavhasiz bitik',
                date: new Date().toLocaleDateString('uz-UZ'),
                body: poemBody.value,
                tags: tagsArray,
                hasAudio: currentAudioBlob !== null || (existingIndex > -1 && poems[existingIndex].hasAudio)
            };

            if(existingIndex > -1) poems[existingIndex] = poemMeta;
            else poems.unshift(poemMeta);

            localStorage.setItem('poems_meta_pro', JSON.stringify(poems));

            if (currentAudioBlob) {
                const transaction = db.transaction(["audios"], "readwrite");
                transaction.objectStore("audios").put({ id: currentPoemId, blob: currentAudioBlob });
            }

            renderPoemList();
            updateStats();
            alert("Bitingiz muvaffaqiyatli saqlandi!");
        }

        // YUKLASH
        function loadPoem(id) {
            currentPoemId = id;
            const poem = poems.find(p => p.id === id);
            if(!poem) return;

            poemTitle.value = poem.title;
            poemBody.value = poem.body;
            poemTags.value = poem.tags ? poem.tags.join(', ') : '';
            
            renderPoemList();

            audioPlayer.style.display = 'none';
            audioStatus.textContent = "Yuklanmoqda...";
            currentAudioBlob = null;

            const transaction = db.transaction(["audios"], "readonly");
            const getReq = transaction.objectStore("audios").get(id);
            getReq.onsuccess = () => {
                if(getReq.result) {
                    currentAudioBlob = getReq.result.blob;
                    audioPlayer.src = URL.createObjectURL(currentAudioBlob);
                    audioPlayer.style.display = 'block';
                    audioStatus.textContent = "🎙️ Tinglash:";
                } else {
                    audioStatus.textContent = "Ovoz yozilmagan";
                }
            };
        }

        // DIKTOFON LOGIKASI
        recordAudioBtn.addEventListener('click', async () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                audioChunks = [];
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        currentAudioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                        audioPlayer.src = URL.createObjectURL(currentAudioBlob);
                        audioPlayer.style.display = 'block';
                        audioStatus.textContent = "🎙️ Ovoz muhrlandi (Saqlashni bosing):";
                        stream.getTracks().forEach(track => track.stop());
                    };
                    mediaRecorder.start();
                    recordAudioBtn.textContent = "STOP";
                    recordAudioBtn.classList.add('recording');
                    audioStatus.textContent = "🔴 Ovoz yozilmoqda...";
                } catch (err) { alert("Mikrofonni faollashtirib bo'lmadi!"); }
            } else {
                mediaRecorder.stop();
                recordAudioBtn.textContent = "REC";
                recordAudioBtn.classList.remove('recording');
            }
        });

        // O'CHIRISH
        document.getElementById('deletePoemBtn').addEventListener('click', () => {
            if(confirm("Ushbu sahifani daftardan o'chirib tashlamoqchimisiz?")) {
                poems = poems.filter(p => p.id !== currentPoemId);
                localStorage.setItem('poems_meta_pro', JSON.stringify(poems));
                const transaction = db.transaction(["audios"], "readwrite");
                transaction.objectStore("audios").delete(currentPoemId);
                initNewPoem();
                renderPoemList();
                updateStats();
            }
        });

        // PDF EKSPORT TIZIMI (NATIVE PRINT LAYOUT)
        document.getElementById('exportPdfBtn').addEventListener('click', () => {
            window.print();
        });

        // ZAXIRALASH (EXPORT TO JSON FAYL)
        document.getElementById('exportJsonBtn').addEventListener('click', async () => {
            let fullData = { meta: poems, audios: [] };
            const transaction = db.transaction(["audios"], "readonly");
            const store = transaction.objectStore("audios");
            const req = store.getAll();
            
            req.onsuccess = () => {
                const results = req.result;
                let promises = results.map(item => {
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            fullData.audios.push({ id: item.id, base64: reader.result });
                            resolve();
                        };
                        reader.readAsDataURL(item.blob);
                    });
                });

                Promise.all(promises).then(() => {
                    const blob = new Blob([JSON.stringify(fullData)], { type: "application/json" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `qalb_daftari_zaxira_${Date.now()}.json`;
                    a.click();
                });
            };
        });

        // TIKLASH (IMPORT JSON FAYL)
        document.getElementById('importJsonInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const imported = JSON.parse(evt.target.result);
                    if (imported.meta && imported.audios) {
                        poems = imported.meta;
                        localStorage.setItem('poems_meta_pro', JSON.stringify(poems));
                        
                        const transaction = db.transaction(["audios"], "readwrite");
                        const store = transaction.objectStore("audios");
                        store.clear();

                        imported.audios.forEach(item => {
                            fetch(item.base64).then(res => res.blob()).then(blob => {
                                store.put({ id: item.id, blob: blob });
                            });
                        });

                        setTimeout(() => {
                            renderPoemList();
                            updateStats();
                            if(poems.length > 0) loadPoem(poems[0].id);
                            alert("Barcha ma'lumotlar va ovozlar muvaffaqiyatli tiklandi!");
                        }, 1000);
                    }
                } catch(err) { alert("Fayl formatida xatolik bor!"); }
            };
            reader.readAsText(file);
        });

        searchInput.addEventListener('input', renderPoemList);
        sortSelect.addEventListener('change', renderPoemList);
        document.getElementById('newPoemBtn').addEventListener('click', initNewPoem);
        document.getElementById('savePoemBtn').addEventListener('click', savePoem);
    </script>
</body>
</html>
