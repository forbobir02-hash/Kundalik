<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheriy Poster & Audio Log Generator v6</title>
    <!-- Barqaror va mustahkam Tailwind CSS CDN (v3) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2canvas Kutubxonasi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            background: radial-gradient(circle at top, #1e1b4b 0%, #0f172a 100%);
            color: #f8fafc;
            min-height: 100vh;
        }
        /* Gradient Neon Border effekti */
        .neon-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #6366f1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #posterPreview {
            max-width: 100%;
            max-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #posterPreview iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 md:p-8">

    <main class="w-full max-w-4xl neon-card rounded-3xl p-6 md:p-8 my-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-black bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent mb-2 tracking-wide">
                Sheriy Poster & Audio Generator
            </h1>
            <p class="text-slate-400 text-sm md:text-base">Sheringizni kiriting, ijro etib ovoz yozing va sun'iy intellekt yordamida kreativ poster yarating.</p>
        </header>

        <!-- INPUT VA OVOZ YOZISH INTERFEYSI -->
        <div class="space-y-6">
            <div>
                <label for="poemTitle" class="block text-xs font-semibold uppercase tracking-wider text-indigo-300 mb-2">Sher sarlavhasi (ixtiyoriy)</label>
                <input type="text" id="poemTitle" placeholder="Masalan: Xotira..." class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-colors focus:ring-1 focus:ring-indigo-500">
            </div>

            <div>
                <label for="poemText" class="block text-xs font-semibold uppercase tracking-wider text-indigo-300 mb-2">Sher matni *</label>
                <textarea id="poemText" rows="6" placeholder="Bu yerga sheringizni kiriting yoki nusxalab joylashtiring..." class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-colors resize-y focus:ring-1 focus:ring-indigo-500"></textarea>
            </div>

            <!-- OVOZ YOZISH BO'LIMI (AVVALGI SHINNAM DIZAYNDA) -->
            <div class="bg-slate-950/60 border border-indigo-950/80 p-5 rounded-2xl space-y-4 shadow-inner">
                <div class="flex items-center justify-between border-b border-slate-800 pb-2">
                    <span class="text-xs font-semibold uppercase tracking-wider text-purple-300 flex items-center gap-2">
                        <span class="flex h-2 w-2 relative">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-purple-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-purple-500"></span>
                        </span>
                        Sher uchun audio log (Ovoz yozuvi)
                    </span>
                    <span id="recordTimer" class="text-sm text-red-400 font-mono bg-red-950/50 px-2.5 py-0.5 rounded-full border border-red-800/40 hidden animate-pulse">00:00</span>
                </div>
                
                <div class="flex flex-wrap items-center gap-4">
                    <button id="startRecordBtn" class="bg-gradient-to-r from-red-600 to-pink-600 hover:from-red-700 hover:to-pink-700 text-white font-medium py-2.5 px-5 rounded-xl flex items-center space-x-2 transition-all transform hover:scale-[1.02] shadow-lg shadow-red-900/20 cursor-pointer">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 01-2 0 7.001 7.001 0 006 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-3v-2.07z" clip-rule="evenodd"></path></svg>
                        <span>Ovoz yozishni boshlash</span>
                    </button>
                    
                    <button id="stopRecordBtn" class="bg-slate-800 hover:bg-slate-700 text-white font-medium py-2.5 px-5 rounded-xl flex items-center space-x-2 transition-all transform hover:scale-[1.02] border border-slate-700 cursor-pointer hidden">
                        <svg class="w-5 h-5 text-red-400 animate-pulse" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd"></path></svg>
                        <span>Yozuvni to'xtatish</span>
                    </button>

                    <div id="audioPlaybackContainer" class="flex-1 min-w-[240px] hidden bg-slate-900/80 p-1.5 rounded-xl border border-slate-800 flex items-center">
                        <audio id="audioPlayback" controls class="w-full h-8 accent-indigo-500"></audio>
                    </div>
                </div>
            </div>

            <!-- POSTER NISBATLARI VA FORMATLAR -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="posterRatio" class="block text-xs font-semibold uppercase tracking-wider text-indigo-300 mb-2">Poster o'lchami (Nisbat)</label>
                    <select id="posterRatio" class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-indigo-500 transition-colors">
                        <option value="1/1">1:1 (Kvadrat - Instagram / Telegram)</option>
                        <option value="4/5" selected>4:5 (Portret - Instagram Post)</option>
                        <option value="9/16">9:16 (Tik - Story / Reels / Shorts)</option>
                    </select>
                </div>
                <div>
                    <label for="exportFormat" class="block text-xs font-semibold uppercase tracking-wider text-indigo-300 mb-2">Yuklab olish formati</label>
                    <select id="exportFormat" class="w-full bg-slate-900/60 border border-slate-700/50 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-indigo-500 transition-colors">
                        <option value="png" selected>PNG (Yuqori sifat)</option>
                        <option value="jpeg">JPEG (Kichik hajm)</option>
                    </select>
                </div>
            </div>

            <button id="generateBtn" class="w-full bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 hover:from-indigo-700 hover:to-purple-700 hover:to-pink-700 text-white font-bold py-3.5 px-6 rounded-xl shadow-xl hover:shadow-indigo-500/20 transition-all transform hover:scale-[1.01] cursor-pointer flex items-center justify-center space-x-2">
                <span>Posterni loyihalash (AI AI)</span>
            </button>
        </div>
    </main>

    <!-- LOADING MODAL -->
    <div id="loadingModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl flex flex-col items-center space-y-4 shadow-2xl max-w-xs w-full mx-4">
            <div class="loader"></div>
            <p class="text-slate-300 font-medium text-center">Sun'iy intellekt jozibador dizayn yaratmoqda...</p>
        </div>
    </div>

    <!-- PREVIEW MODALI -->
    <div id="posterModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4 z-40">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-2xl rounded-2xl flex flex-col max-h-[90vh] shadow-2xl overflow-hidden">
            
            <!-- Modal Header -->
            <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                <h3 class="font-bold text-lg text-slate-200">Tayyor poster ko'rinishi</h3>
                <button id="closeModalBtn" class="text-slate-400 hover:text-white p-1 rounded-lg hover:bg-slate-800 text-2xl transition-colors cursor-pointer">&times;</button>
            </div>

            <!-- Modal Body -->
            <div class="flex-1 overflow-y-auto p-6 flex items-center justify-center bg-slate-950">
                <div id="posterPreview">
                    <!-- Iframe yuklanadi -->
                </div>
            </div>

            <!-- Modal Footer -->
            <div class="p-4 border-t border-slate-800 grid grid-cols-2 gap-4 bg-slate-900/50">
                <button id="regenerateBtn" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-medium py-2.5 px-4 rounded-xl transition-colors cursor-pointer">
                    Qayta yuklash
                </button>
                <button id="downloadPosterBtn" class="bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white font-semibold py-2.5 px-4 rounded-xl shadow-lg hover:shadow-emerald-500/20 transition-all cursor-pointer">
                    Rasm qilib saqlash
                </button>
            </div>
        </div>
    </div>

    <script>
        let rawAiHtml = ""; 
        const API_KEY = "Sizning_Gemini_API_Kalingizni_Shu_Yerga_Qo'ying"; // O'z kalitingizni kiriting

        // DOM Elementlari
        const poemTitle = document.getElementById('poemTitle');
        const poemText = document.getElementById('poemText');
        const posterRatio = document.getElementById('posterRatio');
        const exportFormat = document.getElementById('exportFormat');
        const generateBtn = document.getElementById('generateBtn');
        const regenerateBtn = document.getElementById('regenerateBtn');
        const downloadPosterBtn = document.getElementById('downloadPosterBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        
        const loadingModal = document.getElementById('loadingModal');
        const posterModal = document.getElementById('posterModal');
        const posterPreview = document.getElementById('posterPreview');

        // Audio elementlar
        const startRecordBtn = document.getElementById('startRecordBtn');
        const stopRecordBtn = document.getElementById('stopRecordBtn');
        const recordTimer = document.getElementById('recordTimer');
        const audioPlaybackContainer = document.getElementById('audioPlaybackContainer');
        const audioPlayback = document.getElementById('audioPlayback');

        let mediaRecorder;
        let audioChunks = [];
        let timerInterval;
        let startTime;

        // OVOZ YOZISH LOGIKASI
        startRecordBtn.addEventListener('click', async () => {
            audioChunks = [];
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audioPlayback.src = audioUrl;
                    audioPlaybackContainer.classList.remove('hidden');
                };

                mediaRecorder.start();
                
                startRecordBtn.classList.add('hidden');
                stopRecordBtn.classList.remove('hidden');
                recordTimer.classList.remove('hidden');
                
                startTime = Date.now();
                recordTimer.textContent = "00:00";
                timerInterval = setInterval(() => {
                    const elapsedTime = Date.now() - startTime;
                    const secs = Math.floor((elapsedTime / 1000) % 60).toString().padStart(2, '0');
                    const mins = Math.floor((elapsedTime / 1000 / 60) % 60).toString().padStart(2, '0');
                    recordTimer.textContent = `${mins}:${secs}`;
                }, 1000);

            } catch (err) {
                alert("Mikrofon yoqilmadi: " + err.message);
            }
        });

        stopRecordBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
            clearInterval(timerInterval);
            startRecordBtn.classList.remove('hidden');
            stopRecordBtn.classList.add('hidden');
            recordTimer.classList.add('hidden');
        });

        // PREVIEW ASPECT RATIO SOZLAMALARI
        function updatePreviewRatio() {
            const ratioValues = posterRatio.value.split('/');
            const wRatio = parseFloat(ratioValues[0]);
            const hRatio = parseFloat(ratioValues[1]);
            
            posterPreview.style.aspectRatio = `${wRatio} / ${hRatio}`;
            
            if (posterRatio.value === "1/1") {
                posterPreview.style.width = "450px";
                posterPreview.style.height = "450px";
            } else if (posterRatio.value === "4/5") {
                posterPreview.style.width = "400px";
                posterPreview.style.height = "500px";
            } else if (posterRatio.value === "9/16") {
                posterPreview.style.width = "340px";
                posterPreview.style.height = "604px";
            }
        }

        posterRatio.addEventListener('change', updatePreviewRatio);
        generateBtn.addEventListener('click', callGeminiAi);
        regenerateBtn.addEventListener('click', callGeminiAi);
        closeModalBtn.addEventListener('click', () => { posterModal.style.display = 'none'; });

        // GEMINI AI INTEGRATSIYA
        async function callGeminiAi() {
            const text = poemText.value.trim();
            const title = poemTitle.value.trim();

            if (!text) {
                alert("Iltimos, avval sher matnini yozing!");
                return;
            }

            loadingModal.style.display = 'flex';

            const systemPrompt = `Siz professional grafik va UI/UX dizaynersiz. Berilgan sher matni va sarlavhasiga moslab, ajoyib va tugallangan kreativ HTML/CSS poster dizaynini yaratishingiz kerak.
            
            MUHIM QOIDALAR:
            1. Faqat va faqat toza, hech qanday markdown belgilari (masalan \`\`\`html kabi) bo'lmagan yagona HTML kodini qaytaring. Kod <!DOCTYPE html> bilan boshlanib </html> bilan tugasin.
            2. Dizaynda zamonaviy, jozibador va sher mazmuniga mos keladigan ranglar palitrasi, nafis foni (gradientlar, geometrik yoki mavhum shakllar, naqshlar) hamda professional tipografikadan foydalaning.
            3. Poster har qanday o'lchamga moslashuvchan bo'lishi shart. Buning uchun asosiy dizayn konteynera (wrapper) butun body elementini to'liq egallashi kerak (width: 100%; height: 100%; min-height: 100vh;). Hech qanday "max-width: 500px" yoki "margin: 0 auto" kabi elementni markazda qisib qo'yuvchi qoidalarni ishlatmang! Dizayn cheksiz cho'ziluvchan bo'lsin.
            4. Sher matnini chiroyli tarzda markazlashtiring, qator tashlashlarni (<br>) saqlab qoling. Matn o'qilishi juda oson, kontrast darajasi yuqori bo'lsin.
            5. Borderlar, neon effektlari va soyalardan unumli foydalaning.`;

            const userPrompt = `Sarlavha: ${title || 'Sarlavhasiz'}\nSher Matni:\n${text}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            role: 'user',
                            parts: [ { text: systemPrompt }, { text: userPrompt } ]
                        }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    let aiCode = data.candidates[0].content.parts[0].text.trim();
                    if (aiCode.startsWith('```html')) aiCode = aiCode.substring(7);
                    if (aiCode.endsWith('```')) aiCode = aiCode.substring(0, aiCode.length - 3);
                    
                    rawAiHtml = aiCode.trim();
                    renderPoster(rawAiHtml);
                } else {
                    throw new Error("AI tushunarsiz javob qaytardi.");
                }

            } catch (error) {
                alert("Xatolik yuz berdi: " + error.message);
            } finally {
                loadingModal.style.display = 'none';
            }
        }

        function renderPoster(htmlContent) {
            posterPreview.innerHTML = ""; 
            const iframe = document.createElement('iframe');
            posterPreview.appendChild(iframe);
            updatePreviewRatio(); 

            const doc = iframe.contentWindow.document;
            doc.open();
            doc.write(htmlContent);
            doc.close();

            posterModal.style.display = 'flex';
        }

        // QORA CHEKKALARSIZ EXPORT TIZIMI
        downloadPosterBtn.addEventListener('click', async () => {
            if (!rawAiHtml) { alert("Avval posterni render qiling!"); return; }

            const ratioValues = posterRatio.value.split('/');
            const scale = 2; 
            const width = 1200 * scale; 
            const height = Math.round(width * (parseFloat(ratioValues[1]) / parseFloat(ratioValues[0])));

            const iframe = posterPreview.querySelector('iframe');
            if (!iframe) { alert("Xatolik: Poster render qilinmagan."); return; }

            posterModal.style.display = 'none';
            document.body.style.overflow = 'auto'; 
            
            posterPreview.style.position = 'fixed';
            posterPreview.style.top = '0';
            posterPreview.style.left = '0';
            posterPreview.style.width = width + 'px';
            posterPreview.style.height = height + 'px';
            posterPreview.style.zIndex = '9999';
            posterPreview.style.maxWidth = 'none';
            posterPreview.style.maxHeight = 'none';
            posterPreview.style.aspectRatio = 'auto';
            posterPreview.style.boxShadow = 'none';
            posterPreview.style.border = 'none';
            posterPreview.style.transform = 'scale(1)';

            try {
                await new Promise(r => setTimeout(r, 150));
                const targetElement = iframe.contentWindow.document.body;

                const canvas = await html2canvas(targetElement, {
                    width: width,
                    height: height,
                    scale: 1, 
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: null,
                    scrollX: 0,
                    scrollY: 0
                });

                const selectedFormat = exportFormat.value;
                const mimeType = selectedFormat === 'png' ? 'image/png' : 'image/jpeg';
                const extension = selectedFormat === 'png' ? '.png' : '.jpg';

                const imgData = canvas.toDataURL(mimeType, 0.95);
                
                const a = document.createElement('a');
                a.href = imgData;
                a.download = (poemTitle.value.trim() || 'poster_sher') + extension;
                a.click();
                
            } catch (err) {
                alert("Yuklashda muammo yuz berdi: " + err.message);
            } finally {
                posterPreview.style = '';
                updatePreviewRatio(); 
                posterModal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            }
        });
    </script>
</body>
</html>
