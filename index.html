<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qalb Daftari // Mening She'rlarim</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Georgia', serif; }
        
        /* CSS VARIABLE'LAR: DEFAULT (YORQIN REJIM) */
        :root {
            --bg-main: #fcfaf2;       
            --bg-sidebar: #f4efe2;    
            --bg-card: #ffffff;       
            --accent-gold: #b38f43;   
            --text-main: #2c251e;     
            --text-muted: #7c6f5e;    
            --border-color: #e6dec9;  
            --danger-red: #d32f2f;    
            --overlay-bg: rgba(252, 250, 242, 0.85); 
            --text-inverse: #ffffff;
        }

        /* TUN REJIMI (DARK MODE) OVERRIDE */
        body.dark {
            --bg-main: #12100e;       
            --bg-sidebar: #1a1613;    
            --bg-card: #231e1a;       
            --accent-gold: #dfb76c;   
            --text-main: #f5f0e6;    
            --text-muted: #a39682;    
            --border-color: #322b24;
            --danger-red: #c94a4a;
            --overlay-bg: rgba(18, 16, 14, 0.75);
            --text-inverse: #12100e;
        }

        body { 
            display: flex; 
            height: 100vh; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            overflow: hidden; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* SIDEBAR */
        .sidebar {
            width: 360px; 
            background-color: var(--bg-sidebar); 
            border-right: 1px solid var(--border-color);
            display: flex; 
            flex-direction: column; 
            height: 100%;
            box-shadow: 2px 0 15px rgba(0,0,0,0.05);
            z-index: 5;
            transition: background-color 0.3s, border-color 0.3s;
        }
        
        .sidebar-header { 
            padding: 35px 25px; 
            border-bottom: 1px solid var(--border-color); 
            text-align: center;
        }
        .sidebar-header h2 { 
            font-size: 24px; 
            color: var(--accent-gold); 
            letter-spacing: 1.5px; 
            font-weight: normal;
            text-transform: uppercase;
            border-bottom: 1px double var(--accent-gold);
            padding-bottom: 10px;
            margin-bottom: 8px;
            transition: color 0.3s;
        }
        .sidebar-header p { 
            font-size: 13px; 
            color: var(--text-muted); 
            font-style: italic; 
        }
        
        .poem-list { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 15px; 
        }
        
        .poem-item {
            background: var(--bg-card); 
            padding: 18px; 
            border-radius: 4px; 
            margin-bottom: 14px;
            cursor: pointer; 
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: all 0.3s ease;
        }
        .poem-item:hover {
            border-color: var(--accent-gold);
            transform: translateY(-2px);
        }
        .poem-item.active {
            border-color: var(--accent-gold); 
            background: var(--bg-main);
            box-shadow: 0 4px 12px rgba(179, 143, 67, 0.1);
        }
        .poem-item h4 { 
            font-size: 16px; 
            color: var(--text-main); 
            margin-bottom: 8px; 
            font-weight: bold;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        .poem-item p { 
            font-size: 12px; 
            color: var(--text-muted); 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .audio-badge {
            background: rgba(179, 143, 67, 0.1);
            color: var(--accent-gold);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .add-btn-container { 
            padding: 20px 15px; 
            border-top: 1px solid var(--border-color); 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .btn {
            width: 100%; 
            padding: 14px; 
            background: transparent; 
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold); 
            border-radius: 4px; 
            cursor: pointer;
            font-size: 13px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            transition: all 0.3s;
            text-align: center;
            font-weight: bold;
            outline: none;
        }
        .btn:hover { 
            background: var(--accent-gold); 
            color: var(--text-inverse); 
            box-shadow: 0 4px 10px rgba(179, 143, 67, 0.2);
        }

        /* MAIN WORKSPACE */
        .main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            background: var(--bg-main);
            position: relative;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background 0.5s ease-in-out, background-color 0.3s;
        }
        
        .main-content::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--overlay-bg); 
            z-index: 1;
            pointer-events: none;
            transition: background 0.3s;
        }

        .workspace { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 40px; 
            overflow-y: auto; 
            align-items: center;
            z-index: 2;
        }
        
        .top-bar { 
            width: 100%; 
            max-width: 700px; 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 35px; 
            align-items: center;
        }
        
        .action-group {
            display: flex;
            gap: 12px;
        }

        .del-btn { 
            border-color: var(--danger-red); 
            color: var(--danger-red); 
            width: auto; 
            padding: 10px 20px; 
        }
        .del-btn:hover { 
            background: var(--danger-red); 
            color: #ffffff; 
        }

        .poem-editor { 
            width: 100%; 
            max-width: 700px; 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
        }
        
        .input-title {
            background: transparent; 
            border: none; 
            border-bottom: 1px double var(--border-color);
            color: var(--text-main); 
            font-size: 30px; 
            padding-bottom: 15px; 
            outline: none; 
            width: 100%;
            text-align: center;
            letter-spacing: 1px;
            font-weight: bold;
            transition: border-color 0.3s, color 0.3s;
        }
        .input-title:focus {
            border-bottom-color: var(--accent-gold);
        }
        .input-title::placeholder { color: #bcae9b; font-style: italic; }
        
        .textarea-body {
            background: transparent; 
            border: none; 
            color: var(--text-main); 
            font-size: 20px;
            line-height: 2; 
            resize: none; 
            min-height: 350px; 
            outline: none; 
            width: 100%;
            text-align: center; 
            font-style: italic;
            transition: color 0.3s;
        }
        .textarea-body::placeholder { color: #bcae9b; }

        /* DIKTOFON BLOKI */
        .audio-section {
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 20px;
            margin-top: 30px; 
            padding: 25px; 
            background: var(--bg-sidebar); 
            border-radius: 6px; 
            border: 1px solid var(--border-color);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
            transition: background-color 0.3s, border-color 0.3s;
        }
        
        .rec-btn {
            background: var(--danger-red); 
            color: white; 
            border: none; 
            width: 55px; 
            height: 55px;
            border-radius: 50%; 
            cursor: pointer; 
            font-size: 11px;
            text-transform: uppercase;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            font-weight: bold;
        }
        .rec-btn.recording { 
            background: #ff3333; 
            animation: pulse 1.5s infinite; 
        }
        
        audio { flex: 1; max-width: 420px; }
        #audioStatus { font-size: 14px; color: var(--text-muted); font-style: italic; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(211, 47, 47, 0); }
            100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; height: auto; max-height: 300px; }
            .workspace { padding: 20px; }
            .audio-section { flex-direction: column; }
            audio { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Devoni Ilhom</h2>
            <p>Ko'ngil misralari va ovozlar arxivi</p>
        </div>
        <div class="poem-list" id="poemList"></div>
        <div class="add-btn-container">
            <button class="btn" id="newPoemBtn">+ Yangi Sahifa</button>
            <label class="btn" for="bgInput" style="display: block;">🖼️ Fon Rasmi Tanlash</label>
            <input type="file" id="bgInput" accept="image/*" style="display: none;">
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content" id="mainWorkspace">
        <div class="workspace">
            <div class="top-bar">
                <button class="btn" id="savePoemBtn" style="width:auto; padding: 10px 30px;">💾 Muhrlash (Saqlash)</button>
                
                <!-- REJIM ALMASHTIRISH VA O'CHIRISH -->
                <div class="action-group">
                    <button class="btn" id="themeToggleBtn" style="width:auto; padding: 10px 20px;">🌙 Tun</button>
                    <button class="btn del-btn" id="deletePoemBtn">O'chirish</button>
                </div>
            </div>
            
            <div class="poem-editor">
                <input type="text" class="input-title" id="poemTitle" placeholder="G'azal yoki she'r sarlavhasi...">
                <textarea class="textarea-body" id="poemBody" placeholder="Ushbu sahifaga dil izhorlaringizni biting..."></textarea>
                
                <!-- DIKTOFON -->
                <div class="audio-section">
                    <button class="rec-btn" id="recordAudioBtn">REC</button>
                    <div id="audioStatus">Ovoz yozilmagan</div>
                    <audio id="audioPlayer" controls style="display: none;"></audio>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db;
        let poems = JSON.parse(localStorage.getItem('poems_meta')) || [];
        let currentPoemId = null;
        let mediaRecorder;
        let audioChunks = [];
        let currentAudioBlob = null;

        const mainWorkspace = document.getElementById('mainWorkspace');
        const bgInput = document.getElementById('bgInput');
        const themeToggleBtn = document.getElementById('themeToggleBtn');

        // TUN / KUN REJIMI LOGIKASI
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            themeToggleBtn.textContent = '☀️ Kun';
        } else {
            themeToggleBtn.textContent = '🌙 Tun';
        }

        themeToggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            if (document.body.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
                themeToggleBtn.textContent = '☀️ Kun';
            } else {
                localStorage.setItem('theme', 'light');
                themeToggleBtn.textContent = '🌙 Tun';
            }
        });

        // FON RASMI TIZIMI
        const savedBg = localStorage.getItem('custom_poem_bg');
        if (savedBg) {
            mainWorkspace.style.backgroundImage = `url(${savedBg})`;
        }

        bgInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const base64Image = event.target.result;
                    mainWorkspace.style.backgroundImage = `url(${base64Image})`;
                    localStorage.setItem('custom_poem_bg', base64Image);
                };
                reader.readAsDataURL(file);
            }
        });

        // INDEXED DB (OVOZLAR UCHUN)
        const request = indexedDB.open("PoemAudioDB", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("audios", { keyPath: "id" });
        };
        request.onsuccess = (e) => { 
            db = e.target.result; 
            renderPoemList();
            if(poems.length > 0) loadPoem(poems[0].id);
            else initNewPoem();
        };

        const poemList = document.getElementById('poemList');
        const poemTitle = document.getElementById('poemTitle');
        const poemBody = document.getElementById('poemBody');
        const recordAudioBtn = document.getElementById('recordAudioBtn');
        const audioStatus = document.getElementById('audioStatus');
        const audioPlayer = document.getElementById('audioPlayer');

        function initNewPoem() {
            currentPoemId = 'poem_' + Date.now();
            poemTitle.value = '';
            poemBody.value = '';
            currentAudioBlob = null;
            audioPlayer.style.display = 'none';
            audioStatus.textContent = "Ovoz yozilmagan";
            document.querySelectorAll('.poem-item').forEach(i => i.classList.remove('active'));
        }

        function renderPoemList() {
            poemList.innerHTML = '';
            poems.forEach(poem => {
                const item = document.createElement('div');
                item.className = `poem-item ${poem.id === currentPoemId ? 'active' : ''}`;
                item.onclick = () => loadPoem(poem.id);
                item.innerHTML = `
                    <h4>${poem.title || 'Sarlavhasiz bitik'}</h4>
                    <p><span>📅 ${poem.date}</span> ${poem.hasAudio ? '<span class="audio-badge">🎙️ Ovozli</span>' : ''}</p>
                `;
                poemList.appendChild(item);
            });
        }

        function savePoem() {
            if(!poemTitle.value.trim() && !poemBody.value.trim()) return;

            const existingIndex = poems.findIndex(p => p.id === currentPoemId);
            const poemMeta = {
                id: currentPoemId,
                title: poemTitle.value.trim(),
                date: new Date().toLocaleDateString('uz-UZ'),
                body: poemBody.value,
                hasAudio: currentAudioBlob !== null
            };

            if(existingIndex > -1) poems[existingIndex] = poemMeta;
            else poems.unshift(poemMeta);

            localStorage.setItem('poems_meta', JSON.stringify(poems));

            if (currentAudioBlob) {
                const transaction = db.transaction(["audios"], "readwrite");
                transaction.objectStore("audios").put({ id: currentPoemId, blob: currentAudioBlob });
            }

            renderPoemList();
            alert("Bitingiz muvaffaqiyatli muhrlandi!");
        }

        function loadPoem(id) {
            currentPoemId = id;
            const poem = poems.find(p => p.id === id);
            if(!poem) return;

            poemTitle.value = poem.title;
            poemBody.value = poem.body;
            
            renderPoemList();

            audioPlayer.style.display = 'none';
            audioStatus.textContent = "Varaqlanmoqda...";
            currentAudioBlob = null;

            const transaction = db.transaction(["audios"], "readonly");
            const getReq = transaction.objectStore("audios").get(id);
            getReq.onsuccess = () => {
                if(getReq.result) {
                    currentAudioBlob = getReq.result.blob;
                    audioPlayer.src = URL.createObjectURL(currentAudioBlob);
                    audioPlayer.style.display = 'block';
                    audioStatus.textContent = "🎙️ Tinglash:";
                } else {
                    audioStatus.textContent = "Ovoz yozilmagan";
                }
            };
        }

        recordAudioBtn.addEventListener('click', async () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                audioChunks = [];
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        currentAudioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                        audioPlayer.src = URL.createObjectURL(currentAudioBlob);
                        audioPlayer.style.display = 'block';
                        audioStatus.textContent = "🎙️ Ovoz muhrlandi (Saqlashni bosing):";
                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    recordAudioBtn.textContent = "STOP";
                    recordAudioBtn.classList.add('recording');
                    audioStatus.textContent = "🔴 Baytlar tinglanmoqda, marhamat o'qing...";
                } catch (err) {
                    alert("Mikrofon faollashtirilmadi!");
                }
            } else {
                mediaRecorder.stop();
                recordAudioBtn.textContent = "REC";
                recordAudioBtn.classList.remove('recording');
            }
        });

        document.getElementById('deletePoemBtn').addEventListener('click', () => {
            if(confirm("Ushbu sahifani daftardan o'chirib tashlamoqchimisiz?")) {
                poems = poems.filter(p => p.id !== currentPoemId);
                localStorage.setItem('poems_meta', JSON.stringify(poems));
                
                const transaction = db.transaction(["audios"], "readwrite");
                transaction.objectStore("audios").delete(currentPoemId);
                
                initNewPoem();
                renderPoemList();
            }
        });

        document.getElementById('newPoemBtn').addEventListener('click', initNewPoem);
        document.getElementById('savePoemBtn').addEventListener('click', savePoem);
    </script>
</body>
</html>
