<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheriy Poster Generator v3</title>
    <!-- Google Fonts va TailwindCSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- html2canvas Kutubxonasi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        /* Loader stilizatsiyasi */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Preview maydoni cheklovlari */
        #posterPreview {
            max-width: 100%;
            max-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        #posterPreview iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <main class="w-full max-w-4xl bg-slate-900 border border-slate-800 rounded-2xl p-6 md:p-8 shadow-2xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-400 mb-2">Sheriy Poster Generator</h1>
            <p class="text-slate-400">Sheringizni kiriting va sun'iy intellekt yordamida ajoyib poster dizayniga ega bo'ling.</p>
        </header>

        <!-- INPUT FORMASI -->
        <div class="space-y-6">
            <div>
                <label for="poemTitle" class="block text-sm font-medium text-slate-300 mb-2">Sher sarlavhasi (ixtiyoriy)</label>
                <input type="text" id="poemTitle" placeholder="Masalan: Xotira..." class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-200 focus:outline-none focus:border-blue-500 transition-colors">
            </div>

            <div>
                <label for="poemText" class="block text-sm font-medium text-slate-300 mb-2">Sher matni *</label>
                <textarea id="poemText" rows="6" placeholder="Bu yerga sheringizni kiriting yoki nusxalab joylashtiring..." class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-200 focus:outline-none focus:border-blue-500 transition-colors resize-y"></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="posterRatio" class="block text-sm font-medium text-slate-300 mb-2">Poster o'lchami (Nisbat)</label>
                    <select id="posterRatio" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-200 focus:outline-none focus:border-blue-500 transition-colors">
                        <option value="1/1">1:1 (Kvadrat - Instagram / Telegram)</option>
                        <option value="4/5" selected>4:5 (Portret - Instagram Post)</option>
                        <option value="9/16">9:16 (Tik - Story / Reels / Shorts)</option>
                    </select>
                </div>
                <div>
                    <label for="exportFormat" class="block text-sm font-medium text-slate-300 mb-2">Yuklab olish formati</label>
                    <select id="exportFormat" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-200 focus:outline-none focus:border-blue-500 transition-colors">
                        <option value="png" selected>PNG (Yuqori sifat)</option>
                        <option value="jpeg">JPEG (Kichik hajm)</option>
                    </select>
                </div>
            </div>

            <button id="generateBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg shadow-lg hover:shadow-blue-500/20 transition-all cursor-pointer flex items-center justify-center space-x-2">
                <span>Posterni loyihalash (AI)</span>
            </button>
        </div>
    </main>

    <!-- LOADING MODAL -->
    <div id="loadingModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-xl flex flex-col items-center space-y-4 shadow-2xl max-w-xs w-full mx-4">
            <div class="loader"></div>
            <p class="text-slate-300 font-medium text-center" id="loadingText">Sun'iy intellekt poster dizaynini yaratmoqda...</p>
        </div>
    </div>

    <!-- PREVIEW VA YUKLAB OLISH MODALI -->
    <div id="posterModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4 z-40">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-2xl rounded-2xl flex flex-col max-h-[90vh] shadow-2xl overflow-hidden">
            
            <!-- Modal Header -->
            <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                <h3 class="font-bold text-lg text-slate-200">Tayyor poster ko'rinishi</h3>
                <button id="closeModalBtn" class="text-slate-400 hover:text-white p-1 rounded-lg hover:bg-slate-800 transition-colors cursor-pointer">&times;</button>
            </div>

            <!-- Modal Body (Preview maydoni) -->
            <div class="flex-1 overflow-y-auto p-6 flex items-center justify-center bg-slate-950">
                <div id="posterPreview">
                    <!-- Iframe dinamik ravishda shu yerga joylashadi -->
                </div>
            </div>

            <!-- Modal Footer (Amallar) -->
            <div class="p-4 border-t border-slate-800 grid grid-cols-2 gap-4 bg-slate-900/50">
                <button id="regenerateBtn" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-medium py-2.5 px-4 rounded-lg transition-colors cursor-pointer">
                    Qayta yuklash
                </button>
                <button id="downloadPosterBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 px-4 rounded-lg shadow-lg hover:shadow-emerald-500/20 transition-all cursor-pointer">
                    Rasm qilib saqlash
                </button>
            </div>
        </div>
    </div>

    <script>
        // Loyihaning barcha o'zgaruvchilari
        let rawAiHtml = ""; 
        const API_KEY = "Sizning_Gemini_API_Kalingizni_Shu_Yerga_Qo'ying"; // O'z kalitingizni kiriting

        // DOM Elementlari
        const poemTitle = document.getElementById('poemTitle');
        const poemText = document.getElementById('poemText');
        const posterRatio = document.getElementById('posterRatio');
        const exportFormat = document.getElementById('exportFormat');
        const generateBtn = document.getElementById('generateBtn');
        const regenerateBtn = document.getElementById('regenerateBtn');
        const downloadPosterBtn = document.getElementById('downloadPosterBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        
        const loadingModal = document.getElementById('loadingModal');
        const posterModal = document.getElementById('posterModal');
        const posterPreview = document.getElementById('posterPreview');

        // Tomonlar nisbatini o'zgartirish qoidasi
        function updatePreviewRatio() {
            const ratioValues = posterRatio.value.split('/');
            const wRatio = parseFloat(ratioValues[0]);
            const hRatio = parseFloat(ratioValues[1]);
            
            // Preview konteynerining vizual o'lchamlarini moslaymiz
            posterPreview.style.aspectRatio = `${wRatio} / ${hRatio}`;
            
            if (posterRatio.value === "1/1") {
                posterPreview.style.width = "450px";
                posterPreview.style.height = "450px";
            } else if (posterRatio.value === "4/5") {
                posterPreview.style.width = "400px";
                posterPreview.style.height = "500px";
            } else if (posterRatio.value === "9/16") {
                posterPreview.style.width = "340px";
                posterPreview.style.height = "604px";
            }
        }

        // Nisbat o'zgarganda vizual maydonni moslashtirish
        posterRatio.addEventListener('change', updatePreviewRatio);

        // Generatsiya boshlash amali
        generateBtn.addEventListener('click', callGeminiAi);
        regenerateBtn.addEventListener('click', callGeminiAi);

        // Modalni yopish
        closeModalBtn.addEventListener('click', () => {
            posterModal.style.display = 'none';
        });

        // AI bilan aloqa funksiyasi
        async function callGeminiAi() {
            const text = poemText.value.trim();
            const title = poemTitle.value.trim();

            if (!text) {
                alert("Iltimos, avval poster uchun sher matnini kiriting!");
                return;
            }

            loadingModal.style.display = 'flex';

            const systemPrompt = `Siz professional grafik va UI/UX dizaynersiz. Berilgan sher matni va sarlavhasiga moslab, ajoyib va tugallangan kreativ HTML/CSS poster dizaynini yaratishingiz kerak.
            
            MUHIM QOIDALAR:
            1. Faqat va faqat toza, hech qanday markdown belgilari (masalan \`\`\`html kabi) bo'lmagan yagona HTML kodini qaytaring. Kod <!DOCTYPE html> bilan boshlanib </html> bilan tugasin.
            2. Dizaynda zamonaviy, jozibador va sher mazmuniga mos keladigan ranglar palitrasi, nafis foni (gradientlar, geometrik yoki mavhum shakllar, naqshlar) hamda professional tipografikadan foydalaning.
            3. Poster har qanday o'lchamga moslashuvchan bo'lishi shart. Buning uchun asosiy dizayn konteyneri (wrapper) butun body elementini to'liq egallashi kerak (width: 100%; height: 100%; min-height: 100vh;). Hech qanday "max-width: 500px" yoki "margin: 0 auto" kabi elementni markazda qisib qo'yuvchi qoidalarni ishlatmang! Dizayn cheksiz cho'ziluvchan bo'lsin.
            4. Sher matnini chiroyli tarzda markazlashtiring, qator tashlashlarni (<br>) saqlab qoling. Matn o'qilishi juda oson, kontrast darajasi yuqori bo'lsin.
            5. Borderlar, neon effektlari va soyalardan unumli foydalaning.`;

            const userPrompt = `Sarlavha: ${title || 'Sarlavhasiz'}\nSher Matni:\n${text}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            role: 'user',
                            parts: [
                                { text: systemPrompt },
                                { text: userPrompt }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    let aiCode = data.candidates[0].content.parts[0].text.trim();
                    
                    // Har qanday markdown formatlash belgilarini tozalash
                    if (aiCode.startsWith('```html')) aiCode = aiCode.substring(7);
                    if (aiCode.endsWith('```')) aiCode = aiCode.substring(0, aiCode.length - 3);
                    
                    rawAiHtml = aiCode.trim();
                    renderPoster(rawAiHtml);
                } else {
                    throw new Error("AI tushunarsiz javob qaytardi.");
                }

            } catch (error) {
                alert("Xatolik yuz berdi: " + error.message);
            } finally {
                loadingModal.style.display = 'none';
            }
        }

        // Iframe ichiga HTML kodni xavfsiz va to'g'ri render qilish
        function renderPoster(htmlContent) {
            posterPreview.innerHTML = ""; // Avvalgi elementlarni tozalash
            
            const iframe = document.createElement('iframe');
            posterPreview.appendChild(iframe);
            
            updatePreviewRatio(); // Nisbatni to'g'rilash

            const doc = iframe.contentWindow.document;
            doc.open();
            doc.write(htmlContent);
            doc.close();

            // Asosiy modalni ko'rsatish
            posterModal.style.display = 'flex';
        }


        // =========================================================================
        // MULTAQO YANGI, SANDBOX-SIZ VA KAFOLATLANGAN RASM YUKLASH TIZIMI
        // =========================================================================
        downloadPosterBtn.addEventListener('click', async () => {
            if (!rawAiHtml) { alert("Avval posterni render qiling!"); return; }

            const ratioValues = posterRatio.value.split('/');
            const scale = 2; // Rasm sifatini yuqori aniqlikda (HQ) qilish
            const width = 1200 * scale; 
            const height = Math.round(width * (parseFloat(ratioValues[1]) / parseFloat(ratioValues[0])));

            const iframe = posterPreview.querySelector('iframe');
            if (!iframe) { alert("Xatolik: Poster maydoni topilmadi."); return; }

            // Vaqtincha modalni yashiramiz va preview elementini ekran bo'ylab majburlab cho'zamiz
            posterModal.style.display = 'none';
            document.body.style.overflow = 'auto'; // Suratga olish vaqtida skroll muammolarini yopish
            
            // Elementni majburiy ravishda yuqori pikselli o'lchamga o'tkazamiz
            posterPreview.style.position = 'fixed';
            posterPreview.style.top = '0';
            posterPreview.style.left = '0';
            posterPreview.style.width = width + 'px';
            posterPreview.style.height = height + 'px';
            posterPreview.style.zIndex = '9999';
            posterPreview.style.maxWidth = 'none';
            posterPreview.style.maxHeight = 'none';
            posterPreview.style.aspectRatio = 'auto';
            posterPreview.style.boxShadow = 'none';
            posterPreview.style.border = 'none';
            posterPreview.style.transform = 'scale(1)';

            try {
                // Iframe ichidagi DOM to'liq joylashishi uchun 150ms kutish shart
                await new Promise(r => setTimeout(r, 150));
                
                // Iframe ichidagi aynan body elementidan rasm olamiz (qisib turuvchi chekka o'lchamlarni yo'qotadi)
                const targetElement = iframe.contentWindow.document.body;

                // html2canvas sozlamalari
                const canvas = await html2canvas(targetElement, {
                    width: width,
                    height: height,
                    scale: 1, 
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: null,
                    scrollX: 0,
                    scrollY: 0
                });

                const selectedFormat = exportFormat.value;
                const mimeType = selectedFormat === 'png' ? 'image/png' : 'image/jpeg';
                const extension = selectedFormat === 'png' ? '.png' : '.jpg';

                // Canvasni rasm ma'lumotlariga o'tkazish
                const imgData = canvas.toDataURL(mimeType, 0.95);
                
                // Yuklab olish tugmasini simulyatsiya qilish
                const a = document.createElement('a');
                a.href = imgData;
                a.download = (poemTitle.value.trim() || 'poster_sher') + extension;
                a.click();
                
            } catch (err) {
                alert("Rasmga yuklash jarayonida texnik xatolik: " + err.message);
            } finally {
                // Barcha elementlarni va modalni o'zining vizual holatiga qaytaramiz
                posterPreview.style = '';
                updatePreviewRatio(); 
                posterModal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            }
        });
    </script>
</body>
</html>
