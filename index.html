<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini San'at Asari — She'riy Poster Generator</title>
    <!-- html2canvas kutubxonasi tasvir yuklash uchun shart -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-bg: #16162a;
            --accent-color: #b38f43;
            --text-main: #e2e2e2;
            --border-color: #2a2a40;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Chap boshqaruv paneli */
        .control-panel {
            width: 380px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 5px 0 15px rgba(0,0,0,0.3);
        }

        h2 {
            color: var(--accent-color);
            text-align: center;
            font-size: 22px;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 13px;
            color: #a0a0b0;
            font-weight: 600;
        }

        input[type="text"], select, textarea {
            background-color: #0f0f1d;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            border-color: var(--accent-color);
            outline: none;
            box-shadow: 0 0 5px rgba(179, 143, 67, 0.4);
        }

        textarea {
            resize: none;
            height: 150px;
            line-height: 1.5;
        }

        button {
            background: linear-gradient(135deg, #b38f43, #8c6d2e);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(179, 143, 67, 0.4);
            opacity: 0.95;
        }

        button:active {
            transform: translateY(0);
        }

        .download-btn {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
        }
        .download-btn:hover {
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.4);
        }

        /* O'ng tomon ko'rinish paneli */
        .preview-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            background: radial-gradient(circle, #252538 0%, #0f0f1a 100%);
            position: relative;
        }

        /* Dinamik tomonlar nisbatini saqlovchi ekran korpusi */
        .poster-frame {
            width: 100%;
            max-width: 500px;
            height: 100%;
            max-height: 700px;
            background-color: #0b0b13;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        /* Yashirin sandbox (Rasmga olish uchun orqa fondagi maydon) */
        #sandboxContainer {
            position: absolute;
            left: -9999px;
            top: -9999px;
        }
    </style>
</head>
<body>

    <!-- CHAP BOSHQARUV PANEL -->
    <div class="control-panel">
        <h2>Badiiy Panel</h2>
        
        <div class="form-group">
            <label for="geminiApiKey">Gemini API Kalit:</label>
            <input type="text" id="geminiApiKey" placeholder="AI kalitingizni kiriting...">
        </div>

        <div class="form-group">
            <label for="poemTitle">She'r Sarlavhasi:</label>
            <input type="text" id="poemTitle" placeholder="Masalan: Xotira, Kelajak...">
        </div>

        <div class="form-group">
            <label for="poemBody">She'r Matni:</label>
            <textarea id="poemBody" placeholder="She'r satrlarini bu yerga yozing yoki nusxalab joylashtiring..."></textarea>
        </div>

        <div class="form-group">
            <label for="posterRatio">Poster O'lchami (Proporstiya):</label>
            <select id="posterRatio">
                <option value="1/1.4">Knijniy (A4 / Istoriya) - 1:1.4</option>
                <option value="1/1">Kvadrat (Instagram Post) - 1:1</option>
                <option value="1.4/1">Albomniy (Peyzaj) - 1.4:1</option>
                <option value="1/1.77">Uzun (Tik-Tok / Reels) - 9:16</option>
            </select>
        </div>

        <div class="form-group">
            <label for="exportFormat">Yuklash Formati:</label>
            <select id="exportFormat">
                <option value="jpeg">Format: JPEG (Yengil hajm)</option>
                <option value="png">Format: PNG (Yuqori sifat)</option>
            </select>
        </div>

        <button id="startAiRenderBtn">🎨 Tasvirni Render Qilish</button>
        <button id="downloadPosterBtn" class="download-btn">📥 Posterni Yuklab Olish</button>
    </div>

    <!-- O'NG PREVIEW PANEL -->
    <div class="preview-container">
        <div class="poster-frame" id="posterPreview">
            <div style="color: #6a6a8a; font-style: italic; text-align: center; padding: 20px;">
                Chap paneldagi ma'lumotlarni to'ldiring va "Render Qilish" tugmasini bosing.
            </div>
        </div>
    </div>

    <!-- HTML2CANVAS UCHUN ORQA FONDAGI KANVAS GENERATOR -->
    <div id="sandboxContainer"></div>

    <script>
        let rawAiHtml = ""; // Gemini qaytargan toza HTML kodini saqlaydi

        // Tomonlar nisbatini real vaqtda yangilab turish fuksiyasi
        const posterRatio = document.getElementById('posterRatio');
        const posterPreview = document.getElementById('posterPreview');

        function updatePreviewRatio() {
            const ratioValues = posterRatio.value.split('/');
            const widthRatio = parseFloat(ratioValues[0]);
            const heightRatio = parseFloat(ratioValues[1]);
            
            if(widthRatio <= heightRatio) {
                posterPreview.style.height = "100%";
                posterPreview.style.width = `calc(700px * ${widthRatio / heightRatio})`;
            } else {
                posterPreview.style.width = "100%";
                posterPreview.style.height = `calc(500px * ${heightRatio / widthRatio})`;
            }
        }
        posterRatio.addEventListener('change', updatePreviewRatio);

        // AI RENDERING (YANGILANGAN 3.5-FLASH VA ATOMOSFERIK PROMPT TIZIMI)
        document.getElementById('startAiRenderBtn').addEventListener('click', async () => {
            const key = geminiApiKey.value.trim();
            const title = poemTitle.value.trim() || 'Sarlavhasiz';
            const body = poemBody.value.trim();
            const selectedRatio = posterRatio.value;

            if (!key) { alert("Iltimos, avval chap paneldagi katakka Gemini API kalitingizni kiriting!"); return; }
            if (!body) { alert("Iltimos, avval she'r matnini kiriting!"); return; }

            posterPreview.innerHTML = "<div style='padding:40px; text-align:center; color:#b38f43; font-style:italic;'>🤖 Gemini hayotiy manzara va format talablariga moslab she'riy grafik dizayn render qilmoqda...</div>";

            const promptText = `Siz professional va yuqori darajadagi UI/UX hamda grafik dizaynersiz. Quyida taqdim etilgan o'zbekcha she'r matni va uning sarlavhasini diqqat bilan o'rganib chiqib, bitta ajoyib, mustaqil HTML va inline CSS kodli vizual poster yarating.

            DIQQAT QAT'IY TALAB: Siz o'zingizdan yangi she'r yozmaysiz. Berilgan asl she'r matnini o'zgarishsiz, to'liqligicha poster ichiga joylashtirasiz.

            She'r Sarlavhasi: ${title}
            She'rning Asl Matni:
            ${body}

            Vizual va Fon talablari (REALISTIK HAYOTIY MANZARA):
            1. Shunchaki oddiy bir xil rangli yoki zerikarli qora fon ishlatmang! She'rning mazmuni, kayfiyati va chuqur ruhiga mos keladigan professional real hayotiy manzara fotosuratidan foydalaning.
            2. Buning uchun fon elementi (background-image) sifatida Unsplash platformasining yuqori sifatli fotosuratlaridan foydalaning (Masalan: she'r g'amgin bo'lsa yomg'irli shahar ko'chasi, xira chiroqlar, kuzgi yolg'iz yo'lak; sokin bo'lsa go'zal tungi yulduzli osmon, uzoqdagi tog'lar, dengiz manzarasi). Fon rasmi blokka to'liq moslashishi (background-size: cover; background-position: center; background-repeat: no-repeat;) shart.
            3. DIQQAT: Matn hayotiy rasm fonida yo'qolib ketmasligi yoki o'qish qiyin bo'lmasligi uchun, poster markazida matn ostiga alohida shaffof blok joylashtiring va unga zamonaviy xiralashtirish effektini bering (glassmorphism uslubi - backdrop-filter: blur(15px); background: rgba(0, 0, 0, 0.55); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 12px;). Matn ranglari oq, kumushrang yoki tillaraxsh bo'lib, rasm fonida juda aniq va yaqqol ajralib tursin.

            Format va Texnik talablar:
            1. Posterning tomonlar nisbati aniq [ ${selectedRatio} ] formatda bo'lishi shart. Barcha grafikalar va she'r shu blok ichiga mukammal sig'ishi va chekkalari kesilib ketmasligi kerak.
            2. Poster markazida she'r sarlavhasi (${title}) va uning ostida she'r matni (${body}) to'liq, satrma-satr, nafis badiiy shriftda joylashsin.
            3. Hech qanday markdown belgilari (\`\`\`html) yoki qo'shimcha izohlar qo'shmang, faqat toza HTML matn qaytaring.`;

            try {
                // GOOGLE GEMINI 3.5-FLASH VERSIYASI INTEGRATSIYASI
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `Server xatosi: ${response.status}`);
                }

                const data = await response.json();
                if (!data.candidates || data.candidates.length === 0) throw new Error("Gemini javob qaytara olmadi.");

                rawAiHtml = data.candidates[0].content.parts[0].text;
                // Markdown Tozalash
                rawAiHtml = rawAiHtml.replace(/```html/g, "").replace(/```/g, "").trim();
                
                // Ekrandagi iframe ichiga joylash
                updatePreviewRatio();
                const iframe = document.createElement('iframe');
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.border = 'none';
                posterPreview.innerHTML = '';
                posterPreview.appendChild(iframe);
                
                const doc = iframe.contentWindow.document;
                doc.open();
                doc.write(`<html><head><style>body{margin:0; padding:0; height:100vh; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000;}</style></head><body>${rawAiHtml}</body></html>`);
                doc.close();

            } catch (error) {
                console.error(error);
                posterPreview.innerHTML = `
                    <div style='padding:30px; color:#d32f2f; text-align:center; font-size:14px;'>
                        <strong style='font-size:16px;'>Xatolik!</strong><br><br>
                        Sabab: ${error.message}
                    </div>`;
            }
        });

        // TO'G'RILANGAN KAFOLATLANGAN RASM YUKLASH FUNKSIYASI (QORA CHIZIQLAR VA CHEKLOVLARSIZ)
        document.getElementById('downloadPosterBtn').addEventListener('click', () => {
            if (!rawAiHtml) { alert("Avval posterni render qiling!"); return; }

            const ratioValues = posterRatio.value.split('/');
            const width = 1200; // Yuqori sifatli rasm o'lchami asosi
            const height = Math.round(width * (parseFloat(ratioValues[1]) / parseFloat(ratioValues[0])));

            const sandboxContainer = document.getElementById('sandboxContainer');
            sandboxContainer.innerHTML = '';
            
            const frame = document.createElement('iframe');
            frame.style.width = width + "px";
            frame.style.height = height + "px";
            frame.style.position = "absolute";
            frame.style.visibility = "hidden";
            frame.style.border = "none";
            sandboxContainer.appendChild(frame);

            const frameDoc = frame.contentWindow.document;
            frameDoc.open();
            frameDoc.write(`
                <html>
                <head>
                    <style>
                        html, body { 
                            margin: 0; padding: 0; 
                            width: ${width}px; height: ${height}px; 
                            overflow: hidden; 
                            box-sizing: border-box;
                            background: #000;
                        }
                        /* Gemini bergan har qanday cheklovchi max-width larni majburan sindiramiz va ekranga cho'zamiz */
                        body > * {
                            width: 100% !important;
                            height: 100% !important;
                            max-width: none !important;
                            max-height: none !important;
                            margin: 0 !important;
                            box-sizing: border-box !important;
                        }
                    </style>
                </head>
                <body>
                    ${rawAiHtml}
                </body>
                </html>
            `);
            frameDoc.close();

            // Elementlar to'liq joylashib, rasmlar yuklanishi uchun 400ms kutamiz
            setTimeout(() => {
                const targetBody = frameDoc.body;
                const selectedFormat = exportFormat.value;
                const mimeType = selectedFormat === 'png' ? 'image/png' : 'image/jpeg';
                const extension = selectedFormat === 'png' ? '.png' : '.jpg';

                html2canvas(targetBody, {
                    width: width,
                    height: height,
                    scale: 1, 
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: null 
                }).then(canvas => {
                    const imgData = canvas.toDataURL(mimeType, 0.95);
                    
                    const a = document.createElement('a');
                    a.href = imgData;
                    a.download = (poemTitle.value.trim() || 'she_riy_poster') + extension;
                    a.click();

                    sandboxContainer.innerHTML = ""; // Xotirani bo'shatish
                }).catch(err => {
                    alert("Rasmga aylantirishda xatolik yuz berdi: " + err.message);
                });
            }, 400);
        });
    </script>
</body>
</html>
